<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Product Search</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
}

/* TOP DEAL BAR */

.top-bar{
background:#a2333a;
color:white;
text-align:center;
padding:8px;
font-weight:bold;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 40px;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}


.logo{
font-size:24px;
font-weight:bold;
color:#a2333a;
text-decoration:none;
}

.search-bar{
flex:1;
display:flex;
margin-left: 1rem;
gap: 40px;
}

.search-bar input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

.search-bar button{
padding:10px 15px;
border:none;
background:#007bff;
color:white;
border-radius:20px;
cursor:pointer;
}
.icons{
display:flex;
gap:20px;
font-size:18px;
}

/* NAVBAR */

.navbar{
background:white;
display:flex;
gap:25px;
padding:12px 40px;
border-top:1px solid #eee;
border-bottom:1px solid #eee;
}

.navbar a{
text-decoration:none;
color:#333;
font-weight:500;
}

/* PRODUCT GRID */

.container{
padding:30px 40px;
}

#products{
display:grid;
grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
gap:20px;
}

.product{
border:1px solid #ddd;
padding:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
background:white;
}

.product-img{
width:100%;
height:180px;
overflow:hidden;
border-radius:5px;
margin-bottom:10px;
}

.product-img img{
width:100%;
height:100%;
object-fit:cover;
}

.product:hover{
transform:translateY(-3px);
box-shadow:0 6px 15px rgba(0,0,0,0.15);
transition:0.2s;
}

.product h3{
margin:10px 0 5px;
}

.price{
font-weight:bold;
color:green;
}

.view-btn{
display:inline-block;
margin-top:10px;
padding:6px 10px;
background:#007bff;
color:white;
text-decoration:none;
border-radius:4px;
}

.view-btn:hover{
background:#0056b3;
}

#pagination{
margin-top:20px;
text-align:center;
}

#pagination button{
margin:5px;
padding:8px 12px;
border:none;
background:#007bff;
color:white;
border-radius:4px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- DEAL BAR -->
<div class="top-bar">
Ecommerce
</div>

<!-- HEADER -->
<div class="header">

	<a href="search.html" class="logo">
	    MyShop
	    </a>

<div class="search-bar">
<input type="text" id="searchInput" placeholder="Search products">
<button onclick="searchProducts()">Search</button>
</div>

<div class="icons">
👤 🛒 ❤️
</div>

</div>

<!-- NAVBAR -->
<div class="navbar">
<a href="#">What's New</a>
<a href="#">Electronics</a>
<a href="#">Clothing</a>
<a href="#">Home</a>
<a href="#">Books</a>
<a href="#">Fitness</a>
<a href="#">Bestsellers</a>
<a href="#">Sale</a>
</div>

<!-- PRODUCTS -->

<div class="container">

<div id="products"></div>

<div id="pagination"></div>

</div>

<script>

let currentPage = 0;

function searchProducts(page = 0){

currentPage = page;

let keyword = document.getElementById("searchInput").value;

fetch(`/api/products?q=${keyword}&page=${page}`)
.then(res => res.json())
.then(response => {

let products = response.content;

let html = "";

products.forEach(product => {

html += `
<div class="product">

<div class="product-img">
<img src="https://ecommerce-dhqt.onrender.com${product.imageUrl}" />
</div>

<h3>${product.name}</h3>

<p>${product.description}</p>

<p class="price">₹${product.price}</p>

<a class="view-btn" href="product.html?id=${product.productId}">
View Details
</a>

</div>
`;

});

document.getElementById("products").innerHTML = html;

renderPagination(response.totalPages);

})
.catch(error=>{
console.log("Error:",error);
});

}

function renderPagination(totalPages){

let html="";

for(let i=0;i<totalPages;i++){

html += `
<button onclick="searchProducts(${i})">${i+1}</button>
`;

}

document.getElementById("pagination").innerHTML = html;

}

window.onload = function(){

searchProducts();

document.getElementById("searchInput")
.addEventListener("keypress", function(event){

if(event.key === "Enter"){
searchProducts();
}

});

}

</script>

</body>
</html>
