<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Product Search</title>

<style>

body{
font-family: Arial, sans-serif;
margin:20px;
}

.search-box{
margin-bottom:20px;
}

#products{
display:grid;
grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
gap:20px;
}

.product{
border:1px solid #ddd;
padding:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
background:white;
}

.product-img{
width:100%;
height:180px;
overflow:hidden;
border-radius:5px;
margin-bottom:10px;
}

.product-img img{
width:100%;
height:100%;
object-fit:cover;
}

.product:hover{
transform:translateY(-3px);
box-shadow:0 6px 15px rgba(0,0,0,0.15);
transition:0.2s;
}

.product h3{
margin:10px 0 5px;
}

.price{
font-weight:bold;
color:green;
}

.view-btn{
display:inline-block;
margin-top:10px;
padding:6px 10px;
background:#007bff;
color:white;
text-decoration:none;
border-radius:4px;
}

.view-btn:hover{
background:#0056b3;
}

</style>

</head>

<body>

<h2>Product Search</h2>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search products">
<button onclick="searchProducts()">Search</button>
</div>

<div id="products"></div>
<div id="pagination" style="margin-top:20px;"></div>

<script>
	let currentPage = 0;

	function searchProducts(page = 0){

	currentPage = page;

	let keyword = document.getElementById("searchInput").value;

	fetch(`/api/products?q=${keyword}&page=${page}`)
	.then(res => res.json())
	.then(response => {

	let products = response.content;

	let html = "";

	products.forEach(product => {

	html += `
	<div class="product">

		<div class="product-img">
		<img src="https://ecommerce-dhqt.onrender.com${product.imageUrl}" />
		</div>

	<h3>${product.name}</h3>

	<p>${product.description}</p>

	<p class="price">₹${product.price}</p>

	<a class="view-btn" href="product.html?id=${product.productId}">
	View Details
	</a>

	</div>
	`;

	});

	document.getElementById("products").innerHTML = html;

	renderPagination(response.totalPages);

	})
	.catch(error=>{
	console.log("Error:",error);
	});

	}

	function renderPagination(totalPages){

	let html="";

	for(let i=0;i<totalPages;i++){

	html += `
	<button onclick="searchProducts(${i})"
	style="margin:5px;padding:6px 12px">
	${i+1}
	</button>
	`;

	}

	document.getElementById("pagination").innerHTML = html;

	}

	window.onload=function(){
	searchProducts();
	}	 	

</script>

</body>
</html>
