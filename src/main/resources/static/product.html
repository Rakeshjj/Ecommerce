
<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Product Details</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
}

/* TOP BAR */
.top-bar{
background:#a2333a;
color:white;
text-align:center;
padding:8px;
font-weight:bold;
}

/* HEADER */
.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 40px;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
font-size:24px;
font-weight:bold;
color:#a2333a;
text-decoration:none;
}

.search-bar{
flex:1;
display:flex;
gap:10px;
margin:0 40px;
}

.search-bar input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

.search-bar button{
padding:10px 15px;
border:none;
background:#007bff;
color:white;
border-radius:20px;
cursor:pointer;
}

/* NAVBAR */
.navbar{
background:white;
display:flex;
gap:25px;
padding:12px 40px;
border-top:1px solid #eee;
border-bottom:1px solid #eee;
}

.navbar a{
text-decoration:none;
color:#333;
font-weight:500;
}

/* PRODUCT DETAILS */
.container{
display:flex;
justify-content:center;
margin-top:40px;
}

.product{
border:1px solid #ddd;
padding:20px;
width:420px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
background:white;
}

.product img{
width:100%;
height:250px;
object-fit:cover;
border-radius:5px;
}

.price{
font-size:18px;
color:green;
font-weight:bold;
}

</style>

</head>

<body>

<div class="top-bar">
Ecommerce
</div>

<div class="header">

	<a href="search.html" class="logo">
	    MyShop
	    </a>

<div class="search-bar">
<input type="text" id="searchInput" placeholder="Search products">
<button onclick="goToSearch()">Search</button>
</div>

</div>

<div class="navbar">
<a href="search.html">What's New</a>
<a href="search.html">Electronics</a>
<a href="search.html">Clothing</a>
<a href="search.html">Home</a>
<a href="search.html">Books</a>
<a href="search.html">Fitness</a>
<a href="search.html">Bestsellers</a>
<a href="search.html">Sale</a>
</div>

<div class="container">
<div id="product"></div>
</div>

<script>

function goToSearch(){
let keyword = document.getElementById("searchInput").value;
window.location.href = "search.html?q=" + keyword;
}

let params = new URLSearchParams(window.location.search);
let id = params.get("id");

fetch(`/api/products/${id}`)
.then(res => res.json())
.then(product => {

let html = `
<div class="product">

<img src="https://ecommerce-dhqt.onrender.com${product.imageUrl}" />

<h2>${product.name}</h2>

<p>${product.description}</p>

<p class="price">₹${product.price}</p>

<p><b>SKU:</b> ${product.sku ?? "N/A"}</p>

<p><b>Available:</b> ${product.availability ? "In Stock" : "Out of Stock"}</p>

</div>
`;

document.getElementById("product").innerHTML = html;

})
.catch(error => console.log(error));

</script>

</body>
</html>
