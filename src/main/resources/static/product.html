<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Product Details</title>

<style>

body{
font-family: Arial;
margin:40px;
}

.product{
border:1px solid #ddd;
padding:20px;
width:400px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:250px;
object-fit:cover;
}

.price{
font-size:15px;
color:green;
font-weight:bold;
}

</style>

</head>

<body>

<h2>Product Details</h2>

<div id="product"></div>

<script>

let params = new URLSearchParams(window.location.search);
let id = params.get("id");

fetch(`/api/products/${id}`)
.then(res => res.json())
.then(product => {

let html = `
<div class="product">

<img src="http://localhost:8080${product.imageUrl}" />

<h2>${product.name}</h2>

<p>${product.description}</p>

<p class="price">₹${product.price}</p>

<p><b>SKU:</b> ${product.sku ?? "N/A"}</p>

<p><b>Available:</b> ${product.availability ? "In Stock" : "Out of Stock"}</p>

</div>
`;

document.getElementById("product").innerHTML = html;

})
.catch(error => console.log(error));

</script>

</body>

</html>
